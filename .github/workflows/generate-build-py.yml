name: Generate Build.py

on:
  push:
    branches: [workflows]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies (gerekirse)
        run: |
          python -m pip install --upgrade pip

      - name: Run Generate Build Script
        run: python3 .github/scripts/generate_buid-py.py
