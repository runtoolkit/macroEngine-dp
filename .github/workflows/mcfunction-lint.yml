name: mcfunction Lint

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.mcfunction'
      - '**/*.json'
      - '.github/workflows/mcfunction-lint.yml'
      - '.github/scripts/lint.sh'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.mcfunction'
      - '**/*.json'
      - '.github/scripts/lint.sh'

jobs:
  lint:
    name: AME Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get install -y jq python3

      - name: Run linter
        run: |
          chmod +x .github/scripts/lint.sh
          .github/scripts/lint.sh
